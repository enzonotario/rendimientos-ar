name: Update LECAP Prices

on:
  schedule:
    # Weekdays at 18:00 UTC (15:00 Argentina) - after market close
    - cron: '0 18 * * 1-5'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update LECAP prices from BYMA
        run: NODE_TLS_REJECT_UNAUTHORIZED=0 node update_lecaps.js
        env:
          NODE_TLS_REJECT_UNAUTHORIZED: '0'

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet public/config.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated prices
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/config.json
          git commit -m "Update LECAP prices from BYMA $(date +%Y-%m-%d)"
          git push

      - name: Deploy to Netlify
        if: steps.changes.outputs.changed == 'true'
        run: npx netlify deploy --prod --dir=public --auth=$NETLIFY_AUTH_TOKEN --site=$NETLIFY_SITE_ID
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
