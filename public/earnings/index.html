  <style>
    /* Bridge: earnings.css was authored against the editorial palette.
       Map those token names to the terminal palette so visuals match tty. */
    :root {
      --text: var(--fg);
      --text-secondary: var(--fg-dim);
      --text-tertiary: var(--fg-faint);
      --bg-subtle: var(--bg-1);
      --card-bg: var(--bg-1);
      --border: var(--rule);

<body data-palette="amber" data-scanlines="on" data-density="medium">

        </div>
      </div>
      <nav class="primary">
        <a href="/#mundo"><button>mundo</button></a>
        <a href="/earnings"><button class="on">earnings</button></a>
        <a href="/cedears"><button>cedears</button></a>

      </nav>

  <main class="wrap">
    <a href="/#mundo" class="back-link">← volver a mundo</a>

    <div class="phd">
      <div class="tag">earnings · próximos reportes</div>
      <h1>Earnings Calendar</h1>
      <p>Reportes de resultados de empresas USA para los próximos 3 meses. Click en un día para ver el detalle. Navegá con las flechas o cambiá entre vista semanal y mensual.</p>
    </div>

    <section class="s">
      <div id="earnings-toolbar" class="earnings-toolbar" hidden>
        <div class="earnings-nav">
          <button id="earnings-prev" class="earnings-nav-btn" aria-label="Período anterior">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <span id="earnings-period-label">—</span>
          <button id="earnings-next" class="earnings-nav-btn" aria-label="Período siguiente">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>
        <div class="earnings-view-icons" role="tablist" aria-label="Vista del calendario">
          <button type="button" class="earnings-view-icon active" data-view="week" role="tab" aria-selected="true" title="Vista semanal">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="14" x2="21" y2="14"/></svg>
          </button>
          <button type="button" class="earnings-view-icon" data-view="month" role="tab" aria-selected="false" title="Vista mensual">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="14" x2="8" y2="18"/><line x1="16" y1="14" x2="16" y2="18"/></svg>
          </button>
        </div>
      </div>

      <div id="earnings-loading" class="loading-row"> cargando calendario…</div>
      <div id="earnings-error" class="empty-state" hidden></div>
      <div id="earnings-calendar" class="earnings-calendar" hidden></div>
      <p id="earnings-source" class="hint" style="margin-top:8px"></p>
    </section>
  </main>

  <script>
    // Mini tty clock for the top bar (standalone — no tty.js needed here)
    (function clock() {
      const te = document.getElementById('tty-time');
      const de = document.getElementById('tty-date');
      const MES = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
      function tick() {
        const now = new Date();
        const ar = new Date(now.getTime() + now.getTimezoneOffset() * 60000 - 3 * 60 * 60 * 1000);
        if (te) te.textContent = `${String(ar.getHours()).padStart(2,'0')}:${String(ar.getMinutes()).padStart(2,'0')}:${String(ar.getSeconds()).padStart(2,'0')}`;
        if (de) de.textContent = `${String(ar.getDate()).padStart(2,'0')} ${MES[ar.getMonth()]} ${ar.getFullYear()}`.toUpperCase();
      }
      tick();
      setInterval(tick, 1000);
    })();
  </script>
  <script src="/earnings/earnings.js"></script>
